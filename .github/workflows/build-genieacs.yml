name: build-genieacs

on:
  push:
    branches: [main]
    paths:
      - 'genieacs/**'
      - '.github/workflows/build-genieacs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./genieacs
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/mentionabbe-wq/genieacs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
