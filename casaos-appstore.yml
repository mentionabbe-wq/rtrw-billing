name: rtrw-billing
services:
  app:
    image: ghcr.io/mentionabbe-wq/rtrw-billing:latest
    container_name: rtrw-billing-app
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: rtrw-billing-postgres
      DB_PORT: "5432"
      DB_USER: rtrw
      DB_PASS: ubah-password-ini
      DB_NAME: rtrw_billing
      REDIS_HOST: rtrw-billing-redis
      REDIS_PORT: "6379"
      # WAJIB GANTI sebelum produksi:
      JWT_SECRET: ganti-string-acak-panjang-1
      JWT_REFRESH_SECRET: ganti-string-acak-panjang-2
      JWT_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      # 64 hex (32 byte). GANTI dengan hasil: openssl rand -hex 32
      DATA_ENC_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      SEED_ON_START: "true"
      # Integrasi GenieACS (opsional) — isi URL NBI server GenieACS, mis. http://192.168.88.5:7557
      GENIEACS_URL: ""
      GENIEACS_USERNAME: ""
      GENIEACS_PASSWORD: ""
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - rtrw-net
    x-casaos:
      ports:
        - container: "3000"
          description:
            en_us: Web UI + REST API

  postgres:
    image: postgres:16-alpine
    container_name: rtrw-billing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtrw
      POSTGRES_PASSWORD: ubah-password-ini
      POSTGRES_DB: rtrw_billing
    volumes:
      - /DATA/AppData/rtrw-billing/postgres:/var/lib/postgresql/data
    networks:
      - rtrw-net

  redis:
    image: redis:7-alpine
    container_name: rtrw-billing-redis
    restart: unless-stopped
    networks:
      - rtrw-net

networks:
  rtrw-net:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: mentionabbe-wq
  developer: mentionabbe-wq
  category: Network
  title:
    en_us: RT/RW Net Billing
  tagline:
    en_us: Billing + Mikrotik + SNMP OLT
  description:
    en_us: >-
      Sistem billing RT/RW Net: manajemen pelanggan & paket, auto-suspend via
      Mikrotik API, monitoring optical power ONU via SNMP (ZTE/Huawei),
      tagihan otomatis + WhatsApp, dashboard real-time, 2FA & audit log.
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/mikrotik.png
  scheme: http
  webui_port: 3000
  index: /
  port_map: "3000"
